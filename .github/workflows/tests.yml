name: CorroSim Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pandas matplotlib pytest pytest-cov
    
    - name: Install CorroSim
      run: pip install -e .
    
    - name: Run all tests
      run: pytest tests/ -v
    
    - name: Run coverage
      run: pytest tests/test_tafel_engine.py tests/test_galvanic_engine.py tests/test_eis_engine.py --cov=corrosim.engines --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: false
