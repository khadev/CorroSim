name: CorroSim Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pandas pytest pytest-cov
    
    - name: Install CorroSim
      run: pip install -e .
    
    - name: Test corrosion rate
      run: pytest tests/test_corrosion_rate.py -v
    
    - name: Test Tafel engine
      run: pytest tests/test_tafel_engine.py -v
    
    - name: Test Galvanic engine
      run: pytest tests/test_galvanic_engine.py -v
    
    - name: Test EIS engine
      run: pytest tests/test_eis_engine.py -v
    
    - name: Run coverage report
      run: pytest tests/test_tafel_engine.py tests/test_galvanic_engine.py tests/test_eis_engine.py --cov=corrosim.engines --cov-report=term
