name: Diagnostic - Find the Error

on: [push]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Show current directory
      run: |
        pwd
        ls -la
    
    - name: Show tests directory
      run: |
        ls -la tests/ || echo "tests directory not found!"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pandas pytest pytest-cov
    
    - name: Try to import corrosim
      run: |
        python -c "import sys; print(sys.path)"
        python -c "import corrosim; print('✅ Success!')" || echo "❌ Failed to import corrosim"
    
    - name: Run a single simple test
      run: |
        python -c "
import numpy as np
print('NumPy version:', np.__version__)
assert 1 + 1 == 2
print('Basic test passed')
        "
    
    - name: Run just corrosion rate test
      run: |
        python -m pytest tests/test_corrosion_rate.py -v || echo "❌ Corrosion rate test failed"
    
    - name: Run just constants test
      run: |
        python -c "from corrosim.utils.constants import FARADAY_CONSTANT; print('FARADAY_CONSTANT:', FARADAY_CONSTANT)"
    
    - name: Show Python version and pip list
      run: |
        python --version
        pip list | grep -E "numpy|scipy|pandas|pytest"
