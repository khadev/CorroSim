name: Run CorroSim Engine Tests (Headless)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pandas pytest pytest-cov
    
    - name: Install CorroSim
      run: |
        pip install -e .
        python -c "import corrosim; print('✅ CorroSim imported')"
    
    - name: List test files
      run: |
        echo "Test files found:"
        ls -la tests/*.py 2>/dev/null || echo "No test files found!"
    
    - name: Run tests with verbose output
      run: |
        python -m pytest tests/ -v --tb=short
    
    - name: Run coverage
      run: |
        python -m pytest tests/ --cov=corrosim.engines --cov-report=term --tb=short
