name: Run CorroSim Engine Tests (Headless)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pandas pytest pytest-cov
    
    - name: Install CorroSim
      run: pip install -e .
    
    - name: Verify installation
      run: python -c "import corrosim; print('CorroSim version:', corrosim.__version__)"
    
    - name: List tests
      run: ls -la tests/
    
    - name: Run corrosion rate test
      run: python -m pytest tests/test_corrosion_rate.py -v
    
    - name: Run Tafel tests
      run: python -m pytest tests/test_tafel_engine.py -v
    
    - name: Run Galvanic tests
      run: python -m pytest tests/test_galvanic_engine.py -v
    
    - name: Run EIS tests
      run: python -m pytest tests/test_eis_engine.py -v
