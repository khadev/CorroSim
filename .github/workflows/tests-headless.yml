name: Run CorroSim Engine Tests (Headless)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pandas pytest pytest-cov
    
    - name: Install CorroSim
      run: pip install -e .
    
    - name: Verify installation
      run: |
        python -c "import sys; print('Python path:', sys.path)"
        python -c "import corrosim; print('✅ CorroSim imported successfully')"
        python -c "from corrosim.engines import galvanic_engine; print('✅ Engines accessible')"
    
    - name: Run all tests
      run: |
        cd ~
        python -m pytest /home/runner/work/CorroSim/CorroSim/tests/ -v --tb=short
