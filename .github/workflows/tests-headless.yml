name: Run CorroSim Engine Tests (Headless)

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pandas pytest pytest-cov
    
    - name: Install CorroSim
      run: pip install -e .
    
    - name: List files for debugging
      run: |
        pwd
        ls -la
        ls -la tests/ || echo "tests folder missing!"
    
    - name: Run tests
      run: pytest tests/ -v
