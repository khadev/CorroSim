name: Run All Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install
      run: |
        pip install numpy scipy pandas pytest pytest-cov
        pip install -e .
    
    - name: Test
      run: pytest tests/ -v
