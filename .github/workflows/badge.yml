name: Badge

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install core dependencies (no GUI)
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pandas matplotlib pytest pytest-cov

    - name: Install CorroSim (skip GUI)
      run: |
        pip install -e . --no-deps
        pip install numpy scipy pandas matplotlib

    - name: Verify imports
      run: |
        python -c "import corrosim; print('OK')"
        python -c "from corrosim.tafel_engine import TafelEngine; print('Tafel OK')"

    - name: Run all tests (headless)
      run: |
        python -m pytest tests/ -v --tb=short --maxfail=1
