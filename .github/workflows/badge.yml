name: Badge

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install numpy scipy pandas matplotlib pytest pytest-cov
    - name: Install CorroSim (no GUI)
      run: |
        pip install . --no-deps
        pip install numpy scipy pandas matplotlib
    - name: Run tests
      run: python -m pytest tests/ -v
