name: Badge Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pandas pytest pytest-cov
    
    - name: Install CorroSim
      run: |
        pip install -e .
        python -c "import corrosim; print('✅ Import successful')"
    
    - name: List test files
      run: ls -la tests/
    
    - name: Run a single test
      run: pytest tests/test_corrosion_rate.py -v
    
    - name: Run all engine tests
      run: |
        pytest tests/test_tafel_engine.py -v
        pytest tests/test_galvanic_engine.py -v
        pytest tests/test_eis_engine.py -v
        pytest tests/test_inhibitor_engine.py -v
        pytest tests/test_pitting_engine.py -v
